    <ellipse cx="400" cy="250" rx="55" ry="140" fill="none" stroke="rgba(34,211,238,0.4)" stroke-width="1.5"></ellipse>
    <ellipse cx="400" cy="250" rx="100" ry="140" fill="none" stroke="rgba(34,211,238,0.3)" stroke-width="1.5"></ellipse>
    <circle cx="280" cy="200" r="8" fill="#22d3ee"></circle>
