
<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-remote" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a2e3a"></stop>
      <stop offset="55%" stop-color="#114050"></stop>
      <stop offset="100%" stop-color="#08222a"></stop>
    </linearGradient>
    <radialGradient id="glow-remote" cx="70%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.75"></stop>
      <stop offset="60%" stop-color="#22d3ee" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="glow2-remote" cx="20%" cy="85%" r="70%">
