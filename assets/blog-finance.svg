
<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-finance" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1245"></stop>
      <stop offset="55%" stop-color="#3a2065"></stop>
      <stop offset="100%" stop-color="#220f3a"></stop>
    </linearGradient>
    <radialGradient id="glow-finance" cx="70%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.75"></stop>
      <stop offset="60%" stop-color="#c084fc" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="glow2-finance" cx="20%" cy="85%" r="70%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.55"></stop>
      <stop offset="60%" stop-color="#818cf8" stop-opacity="0"></stop>
    </radialGradient>
    <pattern id="grid-finance" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"></path>
    </pattern>
  </defs>
  <rect width="800" height="500" fill="url(#bg-finance)"></rect>
  <rect width="800" height="500" fill="url(#grid-finance)"></rect>
  <rect width="800" height="500" fill="url(#glow-finance)"></rect>
  <rect width="800" height="500" fill="url(#glow2-finance)"></rect>
  <g>
    <circle cx="400" cy="250" r="120" fill="rgba(192,132,252,0.18)"></circle>
    <circle cx="400" cy="250" r="80" fill="rgba(192,132,252,0.28)"></circle>
    <circle cx="400" cy="250" r="50" fill="rgba(255,255,255,0.18)"></circle>
    <text x="400" y="270" text-anchor="middle" fill="#fff" font-family="serif" font-style="italic" font-size="60" font-weight="500">$</text>
    <g stroke="rgba(255,255,255,0.25)" stroke-width="1" fill="none">
      <circle cx="400" cy="250" r="150"></circle><circle cx="400" cy="250" r="180"></circle>
    </g>
  </g>
</svg>